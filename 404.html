<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>404 - Sayfa Bulunamadı | AgriNova</title>
  <link href="assets/img/icon.png" rel="icon">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      overflow: hidden;
    }
    .error-container {
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }
    .error-code {
      font-size: 180px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .error-title {
      font-size: 2rem;
      color: #333;
      margin-bottom: 15px;
      font-weight: 600;
    }
    .error-message {
      color: #6c757d;
      font-size: 1.1rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 35px;
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 500;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(40, 167, 69, 0.3);
    }
    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(40, 167, 69, 0.4);
      color: white;
    }
    .btn-home i {
      font-size: 1.3rem;
    }
    .decoration {
      position: absolute;
      opacity: 0.1;
      font-size: 300px;
      color: #28a745;
    }
    .decoration.leaf1 { top: -50px; left: -50px; transform: rotate(-30deg); }
    .decoration.leaf2 { bottom: -50px; right: -50px; transform: rotate(150deg); }
    .links {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .links a {
      color: #28a745;
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.3s;
    }
    .links a:hover {
      color: #1e7e34;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <i class="bi bi-leaf decoration leaf1"></i>
  <i class="bi bi-leaf decoration leaf2"></i>
  
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Sayfa Bulunamadı</h1>
    <p class="error-message">
      Aradığınız sayfa taşınmış, silinmiş veya hiç var olmamış olabilir. 
      Endişelenmeyin, ana sayfamızdan devam edebilirsiniz.
    </p>
    <a href="index.html" class="btn-home">
      <i class="bi bi-house-door"></i>
      Ana Sayfaya Dön
    </a>
    <div class="links">
      <a href="index.html#services"><i class="bi bi-gear"></i> Hizmetler</a>
      <a href="index.html#portfolio"><i class="bi bi-collection"></i> Projeler</a>
      <a href="index.html#contact"><i class="bi bi-envelope"></i> İletişim</a>
      <a href="duyurular.html"><i class="bi bi-megaphone"></i> Duyurular</a>
    </div>
  </div>
</body>
</html>
